syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.flashsale";

package flashsale;

// ─── Client-to-Node Messages ───
message BuyTicketRequest {
    string buyer_name = 1;
    string request_id = 2;  // UUID for idempotency
}

message BuyTicketResponse {
    bool success = 1;
    string message = 2;
    int32 remaining_tickets = 3;
    int32 served_by_port = 4;
}

message TicketCountRequest {}

message TicketCountResponse {
    int32 count = 1;
}

// ─── Node-to-Node: Leader Election ───
message ElectionRequest {
    int32 candidate_port = 1;
}

message ElectionResponse {
    bool accepted = 1;
    int32 leader_port = 2;
}

// ─── Node-to-Node: Forward Task to Leader ───
message ForwardBuyRequest {
    string buyer_name = 1;
    int32 origin_port = 2;
    string request_id = 3;  // Propagate idempotency key
}

message ForwardBuyResponse {
    bool success = 1;
    string message = 2;
    int32 remaining_tickets = 3;
}

// ─── Node-to-Node: Distributed Mutex Lock ───
message LockRequest {
    int32 requester_port = 1;
}

message LockResponse {
    bool granted = 1;
}

message UnlockRequest {
    int32 requester_port = 1;
}

message UnlockResponse {
    bool released = 1;
}

// ─── Node-to-Node: Heartbeat ───
message HeartbeatRequest {
    int32 sender_port = 1;
}

message HeartbeatResponse {
    bool alive = 1;
    int32 leader_port = 2;
}

// ─── Services ───
service TicketService {
    // Client-facing RPCs
    rpc BuyTicket (BuyTicketRequest) returns (BuyTicketResponse);
    rpc GetTicketCount (TicketCountRequest) returns (TicketCountResponse);

    // Node-to-Node RPCs
    rpc RequestElection (ElectionRequest) returns (ElectionResponse);
    rpc ForwardBuy (ForwardBuyRequest) returns (ForwardBuyResponse);
    rpc RequestLock (LockRequest) returns (LockResponse);
    rpc ReleaseLock (UnlockRequest) returns (UnlockResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}
